<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Fish Game - Paima Engine</title>
    <link rel="stylesheet" href="/public/game-styles.css" />
    <style>
      /* Three.js canvas renders behind the DOM UI */
      #three-canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }
      #three-canvas-container canvas {
        display: block;
      }
      /* DOM overlay sits on top of canvas */
      #app-container {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="three-canvas-container"></div>
    <script>
      (function() {
        var host = window.location.hostname;
        var protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        if (host !== "localhost" && host !== "127.0.0.1") {
          window.MQTT_ENGINE_BROKER_URL = protocol + "//" + host + "/mqtt";
          window.MQTT_BATCHER_BROKER_URL = protocol + "//" + host + "/mqtt-batcher";
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
